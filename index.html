<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>La Cancha</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- CONTAINER PRINCIPAL -->
  <div id="app">

    <h1>LA CANCHA!</h1>
    <p>Você consegue adivinhar o estádio?</p>
    <p>Um novo estádio é liberado todos os dias, à meia noite.</p>
    <p id="contador" class="contador"></p>

    <div id="estadio">
      <div id="imagem"></div>
      <div class="credito-imagem" id="creditoImagem">
        © Google Earth
      </div>
    </div>

    <div class="entrada">
      <input id="resposta" placeholder="Digite o nome do estádio">
      <button onclick="verificar()">Confirmar</button>
    </div>

    <!-- Tentativas -->
    <div id="tentativas" class="tentativas">
      <span class="bola"></span>
      <span class="bola"></span>
      <span class="bola"></span>
      <span class="bola"></span>
      <span class="bola"></span>
    </div>

    <!-- Dicas -->
    <div id="dicas"></div>

  </div>
  <!-- FIM DO APP -->

  <!-- MODAL FINAL -->
  <div id="resultado" class="resultado oculto">
    <h2 id="mensagemFinal"></h2>
    <p id="estatistica"></p>
    <p id="contadorFinal" class="contador"></p>

    <div class="share">
      <a id="shareTwitter" target="_blank">Twitter</a>
      <a id="shareWhats" target="_blank">WhatsApp</a>
    </div>

    <p class="link">
      🔗 <a href="https://lacanchagame.github.io" target="_blank">Jogue em La Cancha</a>
    </p>
  </div>

  <!-- Scripts SEMPRE no final -->
  <script src="estadios.js"></script>
  <script src="script.js"></script>

</body>
</html>
